name: Playwright Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  sanity:
    name: Sanity Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Run sanity tests
        run: npm test -- tests/specs/sanity.spec.ts

      - name: Upload sanity report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sanity-report
          path: reports/latest/

  full-suite:
    name: Full Test Suite (with known bugs)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Run full test suite
        run: npm test

      - name: Upload full test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: full-suite-report
          path: reports/latest/
